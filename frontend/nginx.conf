# /seasons_erp/frontend/nginx.conf

server {
    listen 80;

    # 1. Serve the React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This line is critical for React Router to work without throwing 404 errors
        try_files $uri $uri/ /index.html; 
    }

    # 2. Proxy API requests to the Python Backend
    location /api/ {
        # 'backend' is the service name from docker-compose.yml
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}