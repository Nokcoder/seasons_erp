server {
    listen 80;

    # 1. Frontend: Standard proxying for Vite
    location / {
	proxy_pass http://frontend:80; 
    	proxy_http_version 1.1;
    	proxy_set_header Upgrade $http_upgrade;
    	proxy_set_header Connection 'upgrade';
    	proxy_set_header Host $host;
    	proxy_cache_bypass $http_upgrade;
    }

    # 2. Backend: The "Trailing Slash" Trick
    location /api/ {
        # The trailing slash on 'http://backend:8000/' acts as a replacement.
        # It takes the '/api/' part of the request and replaces it with '/',
        # cleanly passing '/auth/login' to your FastAPI backend.
        proxy_pass http://backend:8000/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Force-kill CORS issues at the Nginx level
        proxy_hide_header 'Access-Control-Allow-Origin';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
}